<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cora" />
  <meta name="theme-color" content="#0d1e2c" />
  <title>Cora by LCP</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1e2c;
      --navy-mid: #162636;
      --navy-light: #1e3448;
      --teal: #07B5C5;
      --teal-dim: rgba(7,181,197,0.15);
      --teal-glow: rgba(7,181,197,0.08);
      --white: #ffffff;
      --grey-100: #f4f7f8;
      --grey-200: #e2e8ed;
      --grey-400: #8a9aaa;
      --grey-600: #4a5a6a;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      font-family: var(--font);
      color: var(--white);
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
      position: relative;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(16px + var(--safe-top)) 20px 16px;
      background: var(--navy);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 34px;
      height: 34px;
      background: var(--teal);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-logo svg {
      width: 18px;
      height: 18px;
      fill: var(--navy);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.2px;
    }

    .header-text p {
      font-size: 11px;
      color: var(--teal);
      font-weight: 400;
      margin-top: 1px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 6px var(--teal);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 24px;
      padding: 40px 20px;
      text-align: center;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: var(--teal-dim);
      border: 1px solid rgba(7,181,197,0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome-icon svg {
      width: 28px;
      height: 28px;
      fill: var(--teal);
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--white);
    }

    .welcome p {
      font-size: 14px;
      color: var(--grey-400);
      line-height: 1.6;
      max-width: 280px;
    }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 320px;
    }

    .suggestion {
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--grey-200);
      text-align: left;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font);
    }

    .suggestion:hover {
      border-color: rgba(7,181,197,0.4);
      color: var(--white);
      background: var(--navy-mid);
    }

    .suggestion .sug-icon {
      font-size: 14px;
      margin-right: 8px;
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .msg-avatar.bot {
      background: var(--teal);
      color: var(--navy);
    }

    .msg-avatar.user {
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--grey-200);
    }

    .msg-bubble {
      max-width: calc(100% - 80px);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.bot .msg-bubble {
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.07);
      border-top-left-radius: 4px;
      color: var(--grey-100);
    }

    .message.user .msg-bubble {
      background: var(--teal);
      color: var(--navy);
      font-weight: 500;
      border-top-right-radius: 4px;
    }

    /* Markdown in bot messages */
    .msg-bubble strong { font-weight: 600; color: var(--white); }
    .msg-bubble em { font-style: italic; }
    .msg-bubble code {
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .msg-bubble ul, .msg-bubble ol {
      padding-left: 18px;
      margin: 6px 0;
    }
    .msg-bubble li { margin: 3px 0; }
    .msg-bubble p { margin: 4px 0; }
    .msg-bubble h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--teal);
      margin: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      border-top-left-radius: 4px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 12px 16px calc(12px + var(--safe-bottom));
      background: var(--navy);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: rgba(7,181,197,0.4);
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      padding: 2px 0;
    }

    #message-input::placeholder { color: var(--grey-600); }

    #send-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--teal);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    #send-btn:hover { background: #05a0af; }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { background: var(--navy-light); cursor: not-allowed; }

    #send-btn svg {
      width: 16px;
      height: 16px;
      fill: var(--navy);
    }

    #send-btn:disabled svg { fill: var(--grey-600); }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--grey-600);
      margin-top: 8px;
    }

    #mic-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--grey-400);
      transition: all 0.15s;
    }
    #mic-btn:hover { border-color: var(--teal); color: var(--teal); }
    #mic-btn.listening { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); animation: pulse 1s infinite; }
  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-brand">
        <div class="header-logo">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="header-text">
          <h1>Cora</h1>
          <p>Leftfield Capital Partners</p>
        </div>
      </div>
      <div class="status-dot" title="Online"></div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div>
          <h2>Hi Lenny, I'm Cora</h2>
          <p>Ask me anything about the LCP pipeline, portfolio, or BBSW rates.</p>
        </div>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">
            <span class="sug-icon">📋</span>Show me the current pipeline
          </button>
          <button class="suggestion" onclick="sendSuggestion(this)">
            <span class="sug-icon">📅</span>What loans are maturing this month?
          </button>
          <button class="suggestion" onclick="sendSuggestion(this)">
            <span class="sug-icon">📈</span>What's today's BBSW rate?
          </button>
          <button class="suggestion" onclick="sendSuggestion(this)">
            <span class="sug-icon">💼</span>Summarise the portfolio
          </button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="message-input"
          placeholder="Ask Cora about deals, pipeline, BBSW…"
          rows="1"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="mic-btn" onclick="toggleVoice()" title="Voice input">
          <svg id="mic-icon" viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
        </button>
        <button id="send-btn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <p class="input-hint">Cora · Connected to Monday.com · LCP internal use only</p>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const welcomeEl = document.getElementById('welcome');

    let conversationHistory = [];
    let isLoading = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      sendBtn.disabled = !inputEl.value.trim() || isLoading;
    });

    // Send on Enter (not Shift+Enter)
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    function sendSuggestion(btn) {
      const text = btn.innerText.replace(/^[^\w]+/, '').trim();
      inputEl.value = text;
      sendMessage();
    }

    function hideWelcome() {
      if (welcomeEl) {
        welcomeEl.style.display = 'none';
      }
    }

    function addMessage(role, content) {
      hideWelcome();

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `msg-avatar ${role}`;
      avatar.textContent = role === 'bot' ? 'C' : 'L';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (role === 'bot') {
        bubble.innerHTML = renderMarkdown(content);
      } else {
        bubble.textContent = content;
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
      return bubble;
    }

    function addTyping() {
      hideWelcome();
      const wrapper = document.createElement('div');
      wrapper.className = 'typing';
      wrapper.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar bot';
      avatar.textContent = 'C';

      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      wrapper.appendChild(avatar);
      wrapper.appendChild(dots);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Basic markdown renderer
    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(?!<[hul])(.+)$/gm, (m) => m.startsWith('<') ? m : m);
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      addTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        removeTyping();

        if (response.status === 429) {
          removeTyping();
          addMessage('bot', "I'm receiving too many requests right now — please wait 10 seconds and try again.");
          isLoading = false;
          sendBtn.disabled = !inputEl.value.trim();
          return;
        }
        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const data = await response.json();
        const reply = data.reply || "Sorry, I couldn't get a response.";

        addMessage('bot', reply);
        conversationHistory.push({ role: 'assistant', content: reply });

      } catch (err) {
        removeTyping();
        addMessage('bot', `Sorry, something went wrong. Please try again.\n\n_Error: ${err.message}_`);
      }

      isLoading = false;
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.focus();
    }


    // Voice to text
    let recognition = null;
    let listening = false;
    const micBtn = document.getElementById('mic-btn');

    function toggleVoice() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice input is not supported in this browser. Try Chrome or Safari.');
        return;
      }
      if (listening) {
        recognition.stop();
        return;
      }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = 'en-AU';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        listening = true;
        micBtn.classList.add('listening');
      };

      recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        inputEl.value = transcript;
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        sendBtn.disabled = false;
        sendMessage();
      };

      recognition.onerror = () => {
        listening = false;
        micBtn.classList.remove('listening');
      };

      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove('listening');
      };

      recognition.start();
    }

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    inputEl.focus();
  </script>
</body>
</html>
